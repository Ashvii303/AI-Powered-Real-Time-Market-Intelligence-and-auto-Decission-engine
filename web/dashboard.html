<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0b1120;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: linear-gradient(180deg, #020617, #0f172a);
    height: 100vh;
    padding: 20px;
    box-shadow: 5px 0 20px rgba(0,0,0,0.5);
}

.sidebar h2 {
    margin-bottom: 30px;
    color: #6366f1;
}

.menu {
    margin-top: 20px;
}

.menu div {
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    color: #94a3b8;
    transition: 0.3s;
}

.menu div:hover {
    background: rgba(99,102,241,0.2);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 25px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    background: linear-gradient(145deg, #1e293b, #0f172a);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
}

/* GLOW TEXT */
.glow {
    color: #818cf8;
    font-weight: bold;
}

/* CHART */
.chart-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    background: linear-gradient(145deg, #1e293b, #0f172a);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* BUTTON */
button {
    background: #6366f1;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ AI Market</h2>

    <div class="menu">
        <div>📊 Dashboard</div>
        <div>📈 Analytics</div>
        <div>⚙ Settings</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>📊 AI Intelligence Dashboard</h2>
        <button onclick="goHome()">⬅ Back</button>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <h4>Demand</h4>
            <h2 id="demand" class="glow">--</h2>
        </div>

        <div class="card">
            <h4>Best Price</h4>
            <h2 id="price" class="glow">--</h2>
        </div>

        <div class="card">
            <h4>Max Profit</h4>
            <h2 id="profit" class="glow">--</h2>
        </div>

    </div>

    <!-- CHART -->
    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
async function load(){

    const base = +localStorage.getItem("price");
    const discount = +localStorage.getItem("discount");
    const comp = +localStorage.getItem("competitor_price");

    const prices = [base-50, base, base+50];
    const demands = [];
    const profits = [];

    for(let p of prices){

        const res = await fetch("http://127.0.0.1:5000/predict", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                price:p,
                discount,
                competitor_price:comp
            })
        });

        const data = await res.json();

        demands.push(data.predicted_demand);
        profits.push(p * data.predicted_demand);
    }

    let max = Math.max(...profits);
    let idx = profits.indexOf(max);

    document.getElementById("demand").innerText = demands[1].toFixed(2);
    document.getElementById("price").innerText = prices[idx];
    document.getElementById("profit").innerText = max.toFixed(2);

    new Chart(document.getElementById("chart"), {
        type:"line",
        data:{
            labels:prices,
            datasets:[
                {
                    label:"Demand",
                    data:demands,
                    borderColor:"#6366f1",
                    tension:0.4
                },
                {
                    label:"Profit",
                    data:profits,
                    borderColor:"#22c55e",
                    tension:0.4
                }
            ]
        }
    });
}

function goHome(){
    window.location.href = "index.html";
}

load();
</script>

</body>
</html>
