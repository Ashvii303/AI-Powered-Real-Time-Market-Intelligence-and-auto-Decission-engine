<!DOCTYPE html>
<html>
<head>
<title>AI Market Controls</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0b1120;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: linear-gradient(180deg, #020617, #0f172a);
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    color: #6366f1;
}

.menu div {
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    color: #94a3b8;
}

.menu div:hover {
    background: rgba(99,102,241,0.2);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 40px;
}

/* CARD */
.card {
    width: 450px;
    background: linear-gradient(145deg, #1e293b, #0f172a);
    padding: 25px;
    border-radius: 15px;
    margin: auto;
}

/* INPUT */
input[type="range"] {
    width: 100%;
    margin-bottom: 10px;
}

input[type="number"] {
    width: 100%;
    padding: 8px;
    margin-bottom: 5px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: #6366f1;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚡ AI Market</h2>

    <div class="menu">
        <div>📊 Controls</div>
        <div onclick="goDash()">📈 Dashboard</div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <h2>🎯 Market Controls</h2>

    <div class="card">

        <!-- PRICE -->
        <label>Price</label>
        <input type="number" id="price_input" value="400" oninput="syncSlider('price')">
        <input type="range" id="price" min="100" max="1000" value="400" oninput="syncInput('price')">

        <!-- DISCOUNT -->
        <label>Discount</label>
        <input type="number" step="0.05" id="discount_input" value="0.2" oninput="syncSlider('discount')">
        <input type="range" id="discount" min="0" max="1" step="0.05" value="0.2" oninput="syncInput('discount')">

        <!-- COMPETITOR -->
        <label>Competitor Price</label>
        <input type="number" id="competitor_price_input" value="450" oninput="syncSlider('competitor_price')">
        <input type="range" id="competitor_price" min="100" max="1000" value="450" oninput="syncInput('competitor_price')">

        <button onclick="goResult()">Analyze →</button>

    </div>

</div>

<script>
function syncInput(id) {
    document.getElementById(id + "_input").value =
        document.getElementById(id).value;
}

function syncSlider(id) {
    document.getElementById(id).value =
        document.getElementById(id + "_input").value;
}

function goResult() {
    localStorage.setItem("price", document.getElementById("price").value);
    localStorage.setItem("discount", document.getElementById("discount").value);
    localStorage.setItem("competitor_price", document.getElementById("competitor_price").value);

    window.location.href = "result.html";
}

function goDash() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
